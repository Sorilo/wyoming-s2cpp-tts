name: PR CI

# Source-only PR verification: runs tests on every PR to main.
# No builds, no registry access, no publication, no deployments.
# Pinned actions by exact commit SHA for supply-chain integrity.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  source-tests:
    name: Source Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Verify canonical version
        run: uv run python -c "from app.version import __version__; print(f'version={__version__}'); assert __version__ == '0.1.0'"

      - name: Run tests
        run: uv run pytest tests/ --ignore=tests/test_realtime_tuning_unraid.py -v

  security-scan:
    name: Secret and Vulnerability Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout full history for secret scanning
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan source dependencies and configuration
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
