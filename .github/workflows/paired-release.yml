name: Paired Release

# Manually dispatched paired release: builds, smoke-tests, and publishes
# both wrapper and backend images as a matched pair with the same version.
#
# No PR triggers.  No edge/latest tags.  Exact SHA pinning everywhere.
# Source tests gate builds; smoke tests gate registry login/publish.
#
# Supports version formats: v0.1.0, v0.1.0-rc.1 (source remains 0.1.0).
# No default version — must be explicitly provided to prevent accidental release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0 or v0.1.0-rc.1)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  WRAPPER_IMAGE: ghcr.io/${{ github.repository }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  RELEASE_MODE: 'true'

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Gate: source tests must pass before any build.
  # Emits release_version (without v) and created (git commit timestamp).
  # ------------------------------------------------------------------
  source-tests:
    name: Source Tests
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.preflight.outputs.release_version }}
      short_sha: ${{ steps.preflight.outputs.short_sha }}
      created: ${{ steps.preflight.outputs.created }}
    steps:
      - name: Checkout full history for release security scan
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan source dependencies and configuration
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Install uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # verified

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Preflight version validation and outputs
        id: preflight
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Read canonical version from source
          CANONICAL=$(uv run python -c "from app.version import __version__; print(__version__)")
          echo "Canonical source version: ${CANONICAL}"

          # Compare the canonical version as a literal string, never as regex.
          VALID_VERSION=false
          if [ "$VERSION_INPUT" = "v${CANONICAL}" ]; then
            VALID_VERSION=true
          elif [[ "$VERSION_INPUT" == "v${CANONICAL}-rc."* ]]; then
            RC_NUMBER="${VERSION_INPUT#v${CANONICAL}-rc.}"
            if [[ "$RC_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
              VALID_VERSION=true
            fi
          fi
          if [ "$VALID_VERSION" != true ]; then
            echo "ERROR: version '${VERSION_INPUT}' does not match canonical ${CANONICAL}"
            echo "       Must be v${CANONICAL} or v${CANONICAL}-rc.N (N>=1)"
            exit 1
          fi

          # Emit release_version: strip leading v
          RELEASE_VERSION="${VERSION_INPUT#v}"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

          # Preserve the established immutable image-tag convention.
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          # Emit created: deterministic git commit timestamp
          CREATED=$(git show -s --format=%cI HEAD)
          echo "created=${CREATED}" >> "$GITHUB_OUTPUT"

          echo "Release version: ${RELEASE_VERSION}"
          echo "Created: ${CREATED}"

      - name: Verify version consistency
        run: |
          uv run python -c "from app.version import __version__; print(f'source version={__version__}')"
          uv run python -m pytest tests/test_version.py tests/test_version_consistency.py tests/test_docker_version_labels.py tests/test_release_manifest.py -v

      - name: Run full test suite
        run: uv run python -m pytest tests/ --ignore=tests/test_realtime_tuning_unraid.py -v

  # ------------------------------------------------------------------
  # Build wrapper image (no push, export tarball, tag as candidate)
  # ------------------------------------------------------------------
  build-wrapper:
    name: Build Wrapper
    needs: source-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # verified

      - name: Build wrapper image (export tarball, no push)
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/wrapper/Dockerfile
          platforms: linux/amd64
          push: false
          tags: local/wrapper:candidate
          outputs: type=docker,dest=/tmp/wrapper.tar
          build-args: |
            VERSION=${{ needs.source-tests.outputs.release_version }}
            REVISION=${{ github.sha }}
            CREATED=${{ needs.source-tests.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload wrapper tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: wrapper-image
          path: /tmp/wrapper.tar
          retention-days: 1

  # ------------------------------------------------------------------
  # Build backend image (no push, export tarball, tag as candidate)
  # ------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: source-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # verified

      - name: Build backend image (export tarball, no push)
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/s2cpp/Dockerfile.cuda
          platforms: linux/amd64
          push: false
          tags: local/backend:candidate
          outputs: type=docker,dest=/tmp/backend.tar
          build-args: |
            VERSION=${{ needs.source-tests.outputs.release_version }}
            REVISION=${{ github.sha }}
            CREATED=${{ needs.source-tests.outputs.created }}
            S2CPP_REVISION=2c33261938da1a41d713768b1b391b4d368d7d2c
            CUDA_ARCHITECTURES=86
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload backend tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: backend-image
          path: /tmp/backend.tar
          retention-days: 1

  # ------------------------------------------------------------------
  # Smoke: load exact images by tag and verify before any registry access
  # ------------------------------------------------------------------
  smoke:
    name: Smoke Test Pair
    needs: [build-wrapper, build-backend]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download wrapper tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # verified
        with:
          name: wrapper-image
          path: /tmp

      - name: Download backend tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # verified
        with:
          name: backend-image
          path: /tmp

      - name: Load wrapper image
        run: docker load < /tmp/wrapper.tar

      - name: Load backend image
        run: docker load < /tmp/backend.tar

      - name: Verify wrapper image labels
        run: |
          docker inspect local/wrapper:candidate \
            --format 'version={{index .Config.Labels "org.opencontainers.image.version"}} role={{index .Config.Labels "wyoming-s2cpp-tts.role"}}'
          VERSION_LABEL=$(docker inspect local/wrapper:candidate \
            --format '{{index .Config.Labels "org.opencontainers.image.version"}}')
          test "$VERSION_LABEL" = "${{ needs.source-tests.outputs.release_version }}" || { echo "Version mismatch: $VERSION_LABEL != ${{ needs.source-tests.outputs.release_version }}"; exit 1; }

      - name: Verify backend image labels
        run: |
          docker inspect local/backend:candidate \
            --format 'version={{index .Config.Labels "org.opencontainers.image.version"}} role={{index .Config.Labels "wyoming-s2cpp-tts.role"}}'
          VERSION_LABEL=$(docker inspect local/backend:candidate \
            --format '{{index .Config.Labels "org.opencontainers.image.version"}}')
          test "$VERSION_LABEL" = "${{ needs.source-tests.outputs.release_version }}" || { echo "Version mismatch: $VERSION_LABEL != ${{ needs.source-tests.outputs.release_version }}"; exit 1; }

      - name: Smoke wrapper (bounded health polling)
        run: |
          set -euo pipefail
          cleanup() {
            echo "=== wrapper cleanup ==="
            docker logs wrapper-smoke 2>&1 || true
            docker rm -f wrapper-smoke 2>/dev/null || true
          }
          trap cleanup EXIT
          docker run --rm -d --name wrapper-smoke local/wrapper:candidate
          healthy=0
          for i in $(seq 1 30); do
            if docker ps --filter name=wrapper-smoke --format '{{.Status}}' | grep -q 'Up'; then
              HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' wrapper-smoke)
              if [ "$HEALTH" = "healthy" ]; then
                echo "Wrapper healthy after ${i} attempts"
                healthy=1
                break
              fi
            fi
            sleep 2
          done
          if [ "$healthy" -ne 1 ]; then
            echo "ERROR: wrapper did not become healthy"
            docker logs wrapper-smoke 2>&1
            exit 1
          fi
          docker stop wrapper-smoke

      - name: Smoke backend (binary check, fail on error)
        run: |
          set -euo pipefail
          docker run --rm --entrypoint="" local/backend:candidate /usr/local/bin/s2 --help >/dev/null 2>&1
          echo "Backend binary smoke OK"

      - name: Scan wrapper candidate image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          version: v0.72.0
          image-ref: local/wrapper:candidate
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Scan backend candidate image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          version: v0.72.0
          image-ref: local/backend:candidate
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Generate SBOM for wrapper candidate
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0  # verified
        with:
          image: local/wrapper:candidate
          output-file: /tmp/wrapper-sbom.spdx.json

      - name: Generate SBOM for backend candidate
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0  # verified
        with:
          image: local/backend:candidate
          output-file: /tmp/backend-sbom.spdx.json

      - name: Upload candidate SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sboms
          path: /tmp/*-sbom.spdx.json
          retention-days: 90

  # ------------------------------------------------------------------
  # Publish: login and push both images with same version tag + attestation
  # ------------------------------------------------------------------
  publish:
    name: Publish Pair
    needs: smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download wrapper tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # verified
        with:
          name: wrapper-image
          path: /tmp

      - name: Download backend tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # verified
        with:
          name: backend-image
          path: /tmp

      - name: Load images
        run: |
          docker load < /tmp/wrapper.tar
          docker load < /tmp/backend.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # verified
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # verified

      - name: Tag and push wrapper image
        id: push-wrapper
        run: |
          set -euo pipefail
          docker tag local/wrapper:candidate "${{ env.WRAPPER_IMAGE }}:${{ needs.source-tests.outputs.release_version }}"
          docker tag local/wrapper:candidate "${{ env.WRAPPER_IMAGE }}:sha-${{ needs.source-tests.outputs.short_sha }}"
          docker push "${{ env.WRAPPER_IMAGE }}:${{ needs.source-tests.outputs.release_version }}"
          docker push "${{ env.WRAPPER_IMAGE }}:sha-${{ needs.source-tests.outputs.short_sha }}"
          WRAPPER_DIGEST=$(docker buildx imagetools inspect "${{ env.WRAPPER_IMAGE }}:${{ needs.source-tests.outputs.release_version }}" --format '{{json .}}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('manifest',d).get('digest',''))")
          if [[ ! "$WRAPPER_DIGEST" =~ ^sha256:[a-fA-F0-9]{64}$ ]]; then
            echo "ERROR: invalid wrapper digest: $WRAPPER_DIGEST"
            exit 1
          fi
          echo "wrapper_digest=$WRAPPER_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Tag and push backend image
        id: push-backend
        run: |
          set -euo pipefail
          docker tag local/backend:candidate "${{ env.BACKEND_IMAGE }}:${{ needs.source-tests.outputs.release_version }}"
          docker tag local/backend:candidate "${{ env.BACKEND_IMAGE }}:sha-${{ needs.source-tests.outputs.short_sha }}"
          docker push "${{ env.BACKEND_IMAGE }}:${{ needs.source-tests.outputs.release_version }}"
          docker push "${{ env.BACKEND_IMAGE }}:sha-${{ needs.source-tests.outputs.short_sha }}"
          BACKEND_DIGEST=$(docker buildx imagetools inspect "${{ env.BACKEND_IMAGE }}:${{ needs.source-tests.outputs.release_version }}" --format '{{json .}}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('manifest',d).get('digest',''))")
          if [[ ! "$BACKEND_DIGEST" =~ ^sha256:[a-fA-F0-9]{64}$ ]]; then
            echo "ERROR: invalid backend digest: $BACKEND_DIGEST"
            exit 1
          fi
          echo "backend_digest=$BACKEND_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest wrapper image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1 verified
        with:
          subject-name: ${{ env.WRAPPER_IMAGE }}
          subject-digest: ${{ steps.push-wrapper.outputs.wrapper_digest }}
          push-to-registry: true

      - name: Attest backend image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1 verified
        with:
          subject-name: ${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.push-backend.outputs.backend_digest }}
          push-to-registry: true

      - name: Generate release manifest
        id: manifest
        env:
          VERSION: ${{ needs.source-tests.outputs.release_version }}
          S2CPP_REVISION: 2c33261938da1a41d713768b1b391b4d368d7d2c
          SOURCE_SHA: ${{ github.sha }}
          WRAPPER_DIGEST: ${{ steps.push-wrapper.outputs.wrapper_digest }}
          BACKEND_DIGEST: ${{ steps.push-backend.outputs.backend_digest }}
          GENERATED_AT: ${{ needs.source-tests.outputs.created }}
          CREATED: ${{ needs.source-tests.outputs.created }}
          RELEASE_MODE: 'true'
          TEST_RESULTS: '{"passed": true, "source_tests": "ran"}'
        run: |
          python3 scripts/generate_release_manifest.py > /tmp/release-manifest.json
          cat /tmp/release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-manifest
          path: /tmp/release-manifest.json
          retention-days: 90
      - name: Verify paired publication integrity
        if: ${{ always() && (steps.push-wrapper.outcome != 'skipped' || steps.push-backend.outcome != 'skipped') }}
        env:
          RELEASE_VERSION: ${{ needs.source-tests.outputs.release_version }}
        run: |
          set -euo pipefail
          wrapper_ref="${{ env.WRAPPER_IMAGE }}:${RELEASE_VERSION}"
          backend_ref="${{ env.BACKEND_IMAGE }}:${RELEASE_VERSION}"
          wrapper_status=missing
          backend_status=missing
          if docker manifest inspect "$wrapper_ref" >/dev/null 2>&1; then wrapper_status=present; fi
          if docker manifest inspect "$backend_ref" >/dev/null 2>&1; then backend_status=present; fi
          {
            echo "## Paired publication integrity"
            echo "- Wrapper semantic tag: ${wrapper_status}"
            echo "- Backend semantic tag: ${backend_status}"
            echo "- Deployable only if this entire workflow succeeds and manifest/SBOM artifacts exist."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$wrapper_status" != present ] || [ "$backend_status" != present ]; then
            echo "ERROR: partial paired publication; do not deploy this release." >&2
            exit 1
          fi
