name: PR CI

# Source-only PR verification: runs tests on every PR to main.
# No builds, no registry access, no publication, no deployments.
# Pinned actions by exact commit SHA for supply-chain integrity.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  source-tests:
    name: Source Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4aa0d20ccf3c835b4c51100259d7204042244b7  # v6.0.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify canonical version
        run: uv run python -c "from app.version import __version__; print(f'version={__version__}'); assert __version__ == '0.1.0'"

      - name: Run tests
        run: uv run pytest tests/ --ignore=tests/test_realtime_tuning_unraid.py -v
