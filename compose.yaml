# =============================================================================
# compose.yaml — wyoming-s2cpp-tts v0.1.0
# =============================================================================
# Two-container TTS deployment: CPU-only Wyoming wrapper + CUDA s2.cpp backend.
#
# Quick start:
#   1. Copy .env.example to .env and edit host paths / image tags as needed.
#   2. docker compose up -d
#   3. Home Assistant -> Wyoming Protocol integration -> <host>:10200
#
# The backend HTTP port (3030) is NOT published to the host — only the
# wrapper Wyoming port (10200) is exposed. Internal communication happens
# on the private 's2cpp-net' bridge network.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # s2cpp-backend — CUDA inference server (HTTP)
  # ---------------------------------------------------------------------------
  s2cpp-backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sorilo/wyoming-s2cpp-tts-backend:0.1.0}
    container_name: s2cpp-backend
    restart: unless-stopped
    networks:
      - s2cpp-net
    runtime: nvidia
    environment:
      S2_MODEL: ${S2_MODEL:-/models/s2-pro-q4_k_m.gguf}
      S2_HOST: 0.0.0.0
      S2_PORT: 3030
      S2_GPU_LAYERS: ${S2_GPU_LAYERS:--1}
      S2_THREADS: ${S2_THREADS:-8}
      S2_CODEC_CPU: ${S2_CODEC_CPU:-false}
      S2_CUDA_DEVICE: ${S2_CUDA_DEVICE:-0}
      S2_LOG_LEVEL: ${S2_LOG_LEVEL:-info}
      S2_VOICE_DIR: /voices
      S2_CODEC_DECODE_CONTEXT_FRAMES: ${S2_CODEC_DECODE_CONTEXT_FRAMES:-32}
      S2_LOW_LATENCY: ${S2_LOW_LATENCY:-true}
      S2_STREAM_DECODE_STRIDE_FRAMES: ${S2_STREAM_DECODE_STRIDE_FRAMES:-32}
    volumes:
      # Models — read-only: the backend only reads the GGUF + tokenizer.
      - ${MODELS_DIR:-/mnt/user/appdata/s2cpp/models}:/models:ro
      # Voices — read-write needed for backend voice profile creation.
      - ${VOICES_DIR:-/mnt/user/appdata/s2cpp/voices}:/voices
    # Port 3030 intentionally NOT published to host.
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -o /dev/null -w '%{http_code}'             --max-time 3             -X POST http://localhost:3030/generate             -F text="test"           | grep -qE '^2[0-9]{2}$' || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ---------------------------------------------------------------------------
  # wyoming-s2cpp-tts — CPU-only Wyoming Protocol wrapper
  # ---------------------------------------------------------------------------
  wyoming-s2cpp-tts:
    image: ${WRAPPER_IMAGE:-ghcr.io/sorilo/wyoming-s2cpp-tts:0.1.0}
    container_name: wyoming-s2cpp-tts
    restart: unless-stopped
    networks:
      - s2cpp-net
    ports:
      # Wyoming Protocol TCP — publish to host for Home Assistant.
      - "${WYOMING_HOST_PORT:-10200}:10200"
    environment:
      WYOMING_URI: tcp://0.0.0.0:10200
      TTS_BACKEND: s2cpp
      S2_HOST: s2cpp-backend
      S2_PORT: 3030
      S2_STREAM: ${S2_STREAM:-true}
      S2_VOICE_DIR: /voices
      S2_DEFAULT_VOICE: ${S2_DEFAULT_VOICE:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SHUTDOWN_GRACE_TIMEOUT_SEC: ${SHUTDOWN_GRACE_TIMEOUT_SEC:-30}
      ADMIN_HTTP_ENABLED: ${ADMIN_HTTP_ENABLED:-false}
      ADMIN_HTTP_HOST: 127.0.0.1
      ADMIN_HTTP_PORT: 10201
      S2_STREAM_DECODE_STRIDE_FRAMES: ${S2_STREAM_DECODE_STRIDE_FRAMES:-32}
      S2_STREAM_HOLDBACK_FRAMES: ${S2_STREAM_HOLDBACK_FRAMES:-0}
      S2_LOW_LATENCY: ${S2_LOW_LATENCY:-true}
    volumes:
      # Voices — read-only. Wrapper discovers .s2voice profiles for HA selection.
      - ${VOICES_DIR:-/mnt/user/appdata/s2cpp/voices}:/voices:ro
    depends_on:
      s2cpp-backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z localhost 10200 || exit 1
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  s2cpp-net:
    name: ${NETWORK_NAME:-s2cpp-net}
    driver: bridge
    internal: false
